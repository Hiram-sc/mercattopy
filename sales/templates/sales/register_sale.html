{% extends "base.html" %}

{% block title %}Venda | MercattoPy{% endblock %}

{% block content %}
<h3 class="mb-4">Venda</h3>

<form method="post">
    {% csrf_token %}

    <table class="table table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody>
            {% for produto in produtos %}
            <tr>
                <td>{{ produto.nome }}</td>
                <td>
                    <input type="number" name="quantidade_{{ produto.id }}" class="form-control form-control-sm" style="width: 30%">
                </td>
                <td>R$ {{ produto.preco }}</td>
                <td>
                    <div class="ps-4">-</div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button type="submit" class="btn btn-sm btn-primary">Finalizar venda</button>

</form>

{% endblock %}
